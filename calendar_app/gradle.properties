# Enable AndroidX support for all libraries (mandatory for Jetpack Compose)
android.useAndroidX=true
android.enableJetifier=true

# Increase JVM heap size to prevent OutOfMemoryErrors when compiling large compose libraries (like material-icons-extended)
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
